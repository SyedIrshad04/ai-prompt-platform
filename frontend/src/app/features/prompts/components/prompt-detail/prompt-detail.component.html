<div class="detail-page">
  <a routerLink="/prompts" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back to library
  </a>

  <div *ngIf="loading" class="loading-wrap">
    <div class="spinner"></div>
    <p>Loading prompt…</p>
  </div>

  <div *ngIf="error" class="alert alert--error">{{ error }}</div>

  <article *ngIf="!loading && prompt" class="detail-card">
    <header class="detail-header">
      <div class="detail-header__top">
        <h1 class="detail-title">{{ prompt.title }}</h1>
        <div class="detail-actions" *ngIf="isLoggedIn">
          <a [routerLink]="['/prompts', prompt.id, 'edit']" class="btn btn--ghost btn--sm">Edit</a>
          <button class="btn btn--danger btn--sm" [disabled]="deleting" (click)="deletePrompt()">
            {{ deleting ? 'Deleting…' : 'Delete' }}
          </button>
        </div>
      </div>

      <div class="detail-meta">
        <span class="badge" [ngClass]="complexityClass">
          Complexity {{ prompt.complexity }} · {{ complexityLabel }}
        </span>
        <span class="meta-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          {{ prompt.view_count }} view{{ prompt.view_count !== 1 ? 's' : '' }}
        </span>
        <span class="meta-item">{{ formattedDate }}</span>
        <span class="meta-item" *ngIf="prompt.created_by">by {{ prompt.created_by }}</span>
      </div>

      <div class="detail-tags" *ngIf="prompt.tags?.length">
        <span class="tag" *ngFor="let tag of prompt.tags">{{ tag }}</span>
      </div>
    </header>

    <section class="detail-content">
      <div class="content-toolbar">
        <h2>Prompt content</h2>
        <button class="btn btn--ghost btn--sm" (click)="copyContent()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          {{ copied ? 'Copied!' : 'Copy' }}
        </button>
      </div>
      <pre class="content-block">{{ prompt.content }}</pre>
    </section>
  </article>
</div>
