<nav class="navbar">
  <div class="navbar__inner">
    <a routerLink="/prompts" class="navbar__brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
      <span>PromptLab</span>
    </a>

    <div class="navbar__links">
      <a routerLink="/prompts" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Library</a>
      <a routerLink="/analytics" routerLinkActive="active">Analytics</a>
      <a *ngIf="auth.isLoggedIn()" routerLink="/prompts/create" routerLinkActive="active">+ New</a>
    </div>

    <div class="navbar__user">
      <ng-container *ngIf="auth.isLoggedIn$ | async; else loginBtn">
        <span class="username">{{ auth.getUsername() }}</span>
        <button class="btn btn--ghost btn--sm" (click)="logout()">Sign out</button>
      </ng-container>
      <ng-template #loginBtn>
        <a routerLink="/login" class="btn btn--primary btn--sm">Sign in</a>
      </ng-template>
    </div>
  </div>
</nav>
